apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: rds-team-mydb-development-db
  description: "RDS PostgreSQL database for mydb (development) — provisioned via Backstage/ACK"
  annotations:
    backstage.io/managed-by-location: "url:https://github.com/patel0ankur/idp-infra-configs/blob/main/teams/rds-team/infra/rds-instance.yaml"
    backstage.io/managed-by-origin-location: "url:https://github.com/patel0ankur/idp-infra-configs/blob/main/teams/rds-team/infra/rds-instance.yaml"
    # ArgoCD tab — shows sync status, health, deployment history for this team's Application
    argocd/app-name: "rds-team"
    # AWS resource details
    aws/resource-type: "RDS PostgreSQL Instance"
    aws/db-identifier: "rds-team-mydb-development"
    aws/region: "us-east-1"
    aws/console-url: "https://us-east-1.console.aws.amazon.com/rds/home?region=us-east-1#database:id=rds-team-mydb-development;is-cluster=false"
  labels:
    team: rds-team
    environment: development
    cost-center: eng-001
    provisioner: ack
  tags:
    - rds
    - postgresql
    - aws
    - ack
    - development
  links:
    - url: "https://us-east-1.console.aws.amazon.com/rds/home?region=us-east-1#database:id=rds-team-mydb-development;is-cluster=false"
      title: "View in AWS RDS Console"
      icon: dashboard
    - url: "https://github.com/patel0ankur/idp-infra-configs/blob/main/teams/rds-team/infra/rds-instance.yaml"
      title: "View ACK Manifest (GitHub)"
      icon: github
spec:
  type: rds-database
  owner: group:rds-team
  lifecycle: production
  system: rds-team-infrastructure
  dependencyOf: []
