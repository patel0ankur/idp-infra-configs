apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: team-c-webapp-development-bucket
  description: "S3 bucket for webapp (development) — provisioned via Backstage/ACK"
  annotations:
    backstage.io/managed-by-location: "url:https://github.com/patel0ankur/idp-infra-configs/blob/main/teams/team-c/infra/s3-bucket.yaml"
    backstage.io/managed-by-origin-location: "url:https://github.com/patel0ankur/idp-infra-configs/blob/main/teams/team-c/infra/s3-bucket.yaml"
    # ArgoCD tab — shows sync status, health, deployment history for this team's Application
    # The ArgoCD Application name equals the team name (set by the ApplicationSet)
    argocd/app-name: "team-c"
    # AWS resource details — visible in the About card
    aws/resource-type: "S3 Bucket"
    aws/bucket-name: "team-c-webapp-development"
    aws/region: "us-east-1"
    aws/console-url: "https://s3.console.aws.amazon.com/s3/buckets/team-c-webapp-development"
  labels:
    team: team-c
    environment: development
    cost-center: teac-c1010
    provisioner: ack
  tags:
    - s3
    - aws
    - ack
    - development
  links:
    - url: "https://s3.console.aws.amazon.com/s3/buckets/team-c-webapp-development"
      title: "View in AWS S3 Console"
      icon: dashboard
    - url: "https://github.com/patel0ankur/idp-infra-configs/blob/main/teams/team-c/infra/s3-bucket.yaml"
      title: "View ACK Manifest (GitHub)"
      icon: github
spec:
  type: s3-bucket
  owner: group:team-c
  lifecycle: production
  system: team-c-infrastructure
  dependencyOf: []
