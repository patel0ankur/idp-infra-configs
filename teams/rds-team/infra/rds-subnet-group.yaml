apiVersion: rds.services.k8s.aws/v1alpha1
kind: DBSubnetGroup
metadata:
  name: rds-team-mydb-development-subnet-group
  namespace: rds-team
  labels:
    team: rds-team
    environment: development
    managed-by: backstage
    provisioner: ack
spec:
  name: rds-team-mydb-development-subnet-group
  description: "Subnet group for mydb (development) — managed by Backstage/ACK"
  # Private subnets from the platform VPC (set by platform team in this template)
  # Developers don't need to know these — the template handles it automatically
  subnetIDs:
    - subnet-0a055dddc54e2415a   # us-east-1b private
    - subnet-0d3ebae65f79ba484   # us-east-1a private
  tags:
    - key: team
      value: rds-team
    - key: environment
      value: development
    - key: managed-by
      value: backstage-ack
